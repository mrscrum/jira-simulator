name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      check_only:
        description: 'Only check status (skip deploy/rebuild)'
        type: boolean
        default: false
      run_e2e_setup:
        description: 'Run E2E setup after deploy'
        type: boolean
        default: false
      start_simulation:
        description: 'Start simulation after E2E setup'
        type: boolean
        default: false
      clock_speed:
        description: 'Simulation clock speed (1=realtime, 60=accelerated)'
        type: number
        default: 1

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run backend tests
        if: github.event.inputs.check_only != 'true'
        run: |
          cd backend
          pip install -e ".[dev]"
          pytest

      - name: Run Ruff linter
        if: github.event.inputs.check_only != 'true'
        run: |
          cd backend
          ruff check .

      - name: Set up Node.js 20
        if: github.event.inputs.check_only != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run frontend tests
        if: github.event.inputs.check_only != 'true'
        run: |
          cd frontend
          npm ci
          npm test

      - name: Deploy to EC2
        if: success() && github.event.inputs.check_only != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /app/jira-simulator
            git config --global --add safe.directory /app/jira-simulator
            git fetch origin main
            git reset --hard origin/main
            cd frontend && npm ci && npm run build && cd ..
            sudo docker compose up -d --build --force-recreate
            sleep 10

      - name: Verify deployment
        if: success() && github.event.inputs.check_only != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app/jira-simulator
            echo "=== Container status ==="
            sudo docker compose ps
            echo "=== Backend logs (last 50 lines) ==="
            sudo docker compose logs --tail=50 backend
            echo "=== Nginx logs (last 20 lines) ==="
            sudo docker compose logs --tail=20 nginx
            echo "=== Health check ==="
            curl -s http://localhost/health || echo "Health check failed"
            echo ""
            echo "=== API test ==="
            curl -sv http://localhost/api/teams 2>&1 | tail -20
            echo ""
            echo "=== E2E Diagnostics ==="
            curl -s http://localhost/api/e2e/diagnostics 2>&1 | python3 -m json.tool || echo "Diagnostics not available"

      - name: Reset DB before E2E Setup
        if: success() && github.event.inputs.run_e2e_setup == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Stopping simulation ==="
            curl -s -X POST http://localhost/api/simulation/reset || true
            echo ""
            echo "=== Resetting PostgreSQL database ==="
            cd /app/jira-simulator
            sudo docker compose exec -T db psql -U simulator -d simulator -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;" || true
            echo "=== Restarting backend (will re-run migrations) ==="
            sudo docker compose restart backend
            sleep 8
            echo "=== Health check ==="
            curl -s http://localhost/health

      - name: Run E2E Setup
        if: success() && github.event.inputs.run_e2e_setup == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 600s
          script: |
            echo "=== Running E2E Setup ==="
            curl -s -X POST http://localhost/api/e2e/setup 2>&1
            echo ""
            echo "=== Teams after setup ==="
            curl -s http://localhost/api/teams | python3 -m json.tool
            echo ""
            echo "=== Diagnostics (field IDs + sample Jira issue) ==="
            curl -s http://localhost/api/e2e/diagnostics | python3 -m json.tool
            echo ""
            echo "=== Backend logs (field ID lines) ==="
            cd /app/jira-simulator
            sudo docker compose logs --tail=200 backend 2>&1 | grep -i "field\|story.point\|custom\|sim_" || echo "No field-related logs found"

      - name: Start Simulation
        if: success() && github.event.inputs.start_simulation == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            SPEED=${{ github.event.inputs.clock_speed || '1' }}
            echo "=== Preparing simulation (2-day sprints) ==="
            curl -s -X POST http://localhost/api/e2e/prepare-simulation | python3 -m json.tool
            echo ""
            echo "=== Setting clock speed to ${SPEED}x ==="
            curl -s -X PUT http://localhost/api/simulation/clock \
              -H "Content-Type: application/json" \
              -d "{\"speed\": ${SPEED}}" | python3 -m json.tool
            echo ""
            echo "=== Starting simulation ==="
            curl -s -X POST http://localhost/api/simulation/start | python3 -m json.tool
            echo ""
            echo "=== Simulation status ==="
            curl -s http://localhost/api/simulation/status | python3 -m json.tool

      - name: Check Simulation Status (no deploy)
        if: github.event.inputs.check_only == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "=== Simulation Status ==="
            curl -s http://localhost/api/simulation/status | python3 -m json.tool
            echo ""
            echo "=== Queue Stats ==="
            curl -s http://localhost/api/e2e/diagnostics | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            print('Queue:', json.dumps(d.get('queue_stats', {}), indent=2))
            " 2>&1 || echo "Could not fetch diagnostics"
            echo ""
            echo "=== Backend Logs (tick/sprint related, last 80) ==="
            cd /app/jira-simulator
            sudo docker compose logs --tail=300 backend 2>&1 | grep -iE "(tick|sprint|phase|PLANNING|ACTIVE|REVIEW|RETRO|BACKLOG_PREP|transition|Created|Mapped|Team.*:)" | tail -80
